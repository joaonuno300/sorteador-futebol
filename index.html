<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sorteador de Equipas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>⚽ Sorteador de Equipas</h1>

<div class="card">

<h2>Adicionar Jogador</h2>

<input id="nome" placeholder="Nome do jogador">

<select id="nivel">

<option value="1">Nível 1</option>
<option value="2">Nível 2</option>
<option value="3">Nível 3</option>
<option value="4">Nível 4</option>
<option value="5">Nível 5</option>

</select>

<button onclick="adicionarJogador()">Adicionar</button>

</div>

<div class="card">

<h2>Jogadores</h2>

<div id="listaJogadores"></div>

</div>

<div class="card">

<button class="sortear" onclick="sortear()">

Sortear Equipas

</button>

<button onclick="novoSorteio()">

Novo Sorteio

</button>

</div>

<div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
